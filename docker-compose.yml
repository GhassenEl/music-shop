services:
  mysql:
    image: mysql:8.4
    container_name: music-shop-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: music_shop
      MYSQL_USER: music
      MYSQL_PASSWORD: music123
    ports:
      - "3307:3306"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - music_shop_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-umusic", "-pmusic123"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  music_shop_data:
